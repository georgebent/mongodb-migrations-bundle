name: PHP

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    composer:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict
